<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人考勤申请</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        label { display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 6px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 20px; padding: 8px 24px; }
        .msg { margin-top: 12px; padding: 8px; display: none; }
        .msg.ok { background: #d4edda; display: block; }
        .msg.err { background: #f8d7da; display: block; }
    </style>
</head>
<body>
    <h2>考勤申请</h2>
    <div>
        <label>申请人 UUID</label>
        <input id="userUuid" placeholder="输入你的用户uuid">
    </div>
    <div>
        <label>申请类型</label>
        <select id="type">
            <option value="请假">请假</option>
            <option value="加班">加班</option>
            <option value="调休">调休</option>
            <option value="外出">外出</option>
        </select>
    </div>
    <div>
        <label>开始时间</label>
        <input id="startTime" type="datetime-local">
    </div>
    <div>
        <label>结束时间</label>
        <input id="endTime" type="datetime-local">
    </div>
    <div>
        <label>申请原因</label>
        <textarea id="reason" rows="3"></textarea>
    </div>
    <button onclick="submitApply()">提交申请</button>
    <div id="msg" class="msg"></div>

    <script>
        function submitApply() {
            const data = {
                userUuid: document.getElementById('userUuid').value,
                type: document.getElementById('type').value,
                startTime: document.getElementById('startTime').value + ':00',
                endTime: document.getElementById('endTime').value + ':00',
                reason: document.getElementById('reason').value
            };
            fetch('/attendanceApply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                const msg = document.getElementById('msg');
                msg.className = 'msg ok';
                msg.textContent = '申请成功，uuid: ' + res.uuid;
            })
            .catch(err => {
                const msg = document.getElementById('msg');
                msg.className = 'msg err';
                msg.textContent = '申请失败: ' + err.message;
            });
        }
    </script>
</body>
</html>
